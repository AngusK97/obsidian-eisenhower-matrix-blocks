name: Release

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Verify tag and manifest version
        shell: bash
        run: |
          manifest_version=$(node -p "require('./manifest.json').version")
          test "$GITHUB_REF_NAME" = "$manifest_version"
      - run: npm run verify
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" main.js manifest.json styles.css --generate-notes --title "$GITHUB_REF_NAME"
