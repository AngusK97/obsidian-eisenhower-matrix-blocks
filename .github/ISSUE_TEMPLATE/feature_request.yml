name: Feature request
description: Propose an improvement to the matrix workflow
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Describe the problem first. This helps evaluate whether the change fits note-local Markdown matrices on desktop and mobile.
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What is difficult or impossible in your current workflow?
    validations:
      required: true
  - type: textarea
    id: current-workflow
    attributes:
      label: Current workflow
      description: How do you handle this today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the result and interaction you expect, without relying only on a specific implementation.
    validations:
      required: true
  - type: dropdown
    id: platforms
    attributes:
      label: Required platforms
      options:
        - Desktop and mobile
        - Desktop only
        - Mobile only
    validations:
      required: true
  - type: dropdown
    id: markdown-impact
    attributes:
      label: Would this change the Markdown stored in the note?
      options:
        - No
        - Yes
        - Unsure
    validations:
      required: true
  - type: textarea
    id: markdown-details
    attributes:
      label: Markdown or compatibility details
      description: If relevant, show a minimal fictional example and explain how existing boards should behave.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: List workarounds or simpler approaches you have tried.
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: Any examples or attachments use fictional data and contain no private vault content.
          required: true
